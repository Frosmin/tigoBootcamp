services:
  db:
    image: postgres:15-alpine
    container_name: postgres-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./tablas.sql:/docker-entrypoint-initdb.d/001-tablas.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mydatabase"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    container_name: redis-notificaciones
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command:
      - redis-server
      - --requirepass
      - "redis123"
      - --appendonly
      - "yes"
      - --maxmemory-policy
      - noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    ports:
      - "3050:3050"
    env_file: .env
    environment:
      PORT: 3050
      P_DB_HOST: db
      REDIS_HOST: redis
    depends_on:
      db:
        condition: service_healthy

  worker:
    build: .
    restart: unless-stopped
    command: ["node", "--require", "./opentelemetry.js", "./worker.js"]
    env_file: .env
    environment:
      P_DB_HOST: db
      REDIS_HOST: redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  sms-mock:
    build: .
    profiles: ["development"]
    command: ["node", "./dev/sms-mock.js"]
    environment:
      SMS_PROVIDER_TOKEN: dev-sms-token

volumes:
  postgres_data:
  redis_data:
